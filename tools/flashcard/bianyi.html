<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>编译原理 · 名词解释抽背卡</title>
    <link rel="stylesheet" href="../../css/global.css">
    <style>
        .header {
            text-align: center;
            margin-bottom: 2rem;
            border-bottom: 2px dashed #000000;
            padding-bottom: 1rem;
        }
        h1 {
            font-size: 1.6rem;
            font-weight: 900;
            letter-spacing: -0.5px;
            color: #000000;
            margin-bottom: 0.5rem;
        }
        .sub {
            color: #666666;
            font-size: 0.8rem;
        }

        .stats-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            border: 2px solid #000000;
            padding: 0.5rem 1rem;
            background: #fafafa;
        }
        .counter {
            font-size: 0.85rem;
            font-weight: 700;
        }

        /* 纯黑白硬朗卡片 */
        .card {
            background: #ffffff;
            border: 2px solid #000000;
            padding: 3rem 2rem;
            min-height: 300px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            margin-bottom: 1.5rem;
            position: relative;
        }
        .card:hover {
            background: #fcfcfc;
            outline: 2px dashed #000000;
            outline-offset: 4px;
        }
        .term {
            font-size: 2.2rem;
            font-weight: 900;
            text-align: center;
            word-break: break-word;
        }
        .definition {
            font-size: 1rem;
            line-height: 1.6;
            color: #000000;
            text-align: left;
            width: 100%;
            max-width: 600px;
            margin-top: 2rem;
            padding-top: 1.5rem;
            border-top: 2px dashed #000000;
            word-break: break-word;
        }
        .card-footer-hint {
            position: absolute;
            bottom: 0.5rem;
            font-size: 0.7rem;
            color: #666666;
            text-transform: uppercase;
        }

        .nav-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .key-hint {
            text-align: center;
            font-size: 0.75rem;
            color: #666666;
            border-top: 1px solid #000000;
            padding-top: 1rem;
            margin-top: 2rem;
        }

        .back-home {
            display: inline-block;
            margin-bottom: 1rem;
            text-decoration: none;
            color: #000000;
            font-size: 0.8rem;
            font-weight: 700;
        }
        .back-home:hover {
            text-decoration: underline;
        }

        @media (max-width: 550px) {
            .card { padding: 2rem 1rem; min-height: 240px; }
            .term { font-size: 1.6rem; }
            .definition { font-size: 0.9rem; }
        }
    </style>
</head>
<body>
<div class="container">
    <a href="/" class="back-home">◀ RETURN TO INDEX</a>

    <div class="header">
        <h1>COMPILER_PRINCIPLE // 名词解释</h1>
        <div class="sub">Context-Free Grammar & Automata Flashcards</div>
    </div>

    <div class="stats-bar">
        <span class="counter" id="progressCounter">0 / 0</span>
        <button id="shuffleBtn">🎲 RANDOM_SHUFFLE</button>
    </div>

    <div class="card" id="flashcard">
        <div class="term" id="termDisplay">LOADING...</div>
        <div class="definition" id="defDisplay" style="display: none;"></div>
        <div class="card-footer-hint">[ CLICK TO TOGGLE ANSWER ]</div>
    </div>

    <div class="nav-buttons">
        <button id="prevBtn">◀ PREV_CARD</button>
        <button id="nextBtn">NEXT_CARD ▶</button>
    </div>

    <div class="key-hint">
        SHORTCUTS: ← PREV_CARD  |  → NEXT_CARD  |  ↑ / SPACE TOGGLE
    </div>
</div>

<script>
    // 保持你原有的干净、纯 JS 数据逻辑不变
    const TERMS_DATA = [
        { term: "LHS", definition: "Left-Hand Side，产生式左侧，通常为单个非终结符。" },
        { term: "RHS", definition: "Right-Hand Side，产生式右侧，由终结符与非终结符组成的序列。" },
        { term: "RL", definition: "Regular Language，正则语言，可由有限自动机识别的语言类。" },
        { term: "CFL", definition: "Context-Free Language，上下文无关语言，可由下推自动机(PDA)识别。" },
        { term: "CFG", definition: "Context-Free Grammar，上下文无关文法，规则形式 A → γ，不依赖上下文即可展开。" },
        { term: "DFA", definition: "Deterministic Finite Automaton，确定有限自动机，每个状态对同一输入有唯一转移。" },
        { term: "NFA", definition: "Non-deterministic Finite Automaton，非确定有限自动机，存在 ε 转移或多条路径。" },
        { term: "PDA", definition: "Pushdown Automaton，下推自动机，带栈的有限自动机，识别 CFL。" },
        { term: "NPDA", definition: "Non-deterministic Pushdown Automaton，非确定下推自动机。" },
        { term: "DPDA", definition: "Deterministic Pushdown Automaton，确定下推自动机，识别确定性 CFL。" },
        { term: "LL(n)", definition: "LL(n) Parser，从左到右、最左推导、向前看 n 个符号的语法分析器。" },
        { term: "LR(n)", definition: "LR(n) Parser，从左到右、最右推导、向前看 n 个符号的语法分析器。" },
        { term: "SLR", definition: "Simple LR，简单 LR 分析法，使用 Follow 集解决移进/归约冲突。" },
        { term: "AST", definition: "Abstract Syntax Tree，抽象语法树，忽略分隔符等语法细节，保留结构信息。" },
        { term: "DAG (Syntax DAG)", definition: "Directed Acyclic Graph，语法有向无环图，共享公共子表达式。" },
        { term: "SDD", definition: "Syntax-Directed Definition，语法制导定义，将属性与文法符号关联。" },
        { term: "SDT", definition: "Syntax-Directed Translation，语法制导翻译，在产生式中嵌入语义动作。" },
        { term: "IR", definition: "Intermediate Representation，中间表示，编译器中位于前端与后端之间的代码形式。" },
        { term: "TAC", definition: "Three-Address Code，三地址码，每条指令最多三个地址的 IR。" },
        { term: "ASM", definition: "Assembly，汇编代码，机器指令的符号形式。" },
        { term: "SSA", definition: "Static Single Assignment Form，静态单赋值形式，每个变量只赋值一次，便于数据流分析。" },
        { term: "IDF", definition: "Iterated Dominance Frontier，迭代支配边界，用于计算 SSA 中 φ 函数插入位置。" },
        { term: "EBB", definition: "Extended Basic Block，扩展基本块，由多个基本块组成但仅有单一入口。" },
        { term: "CG", definition: "Call Graph，调用图，描述函数/过程之间的调用关系。" },
        { term: "DFA (Data-Flow)", definition: "Data-Flow Analysis，数据流分析，通过程序结构推导各点的变量取值信息。" },
        { term: "IFDS", definition: "Inter-procedural Finite Distributive Subset Problem，过程间有限可分子集问题，一种过程间数据流分析框架。" },
        { term: "CS-DDA", definition: "Context-Sensitive Demand-Driven Analysis，上下文敏感的按需分析 (常见缩写)。" },
        { term: "PL", definition: "Propositional Logic，命题逻辑，由命题变量与逻辑连接词（与、或、非等）构成。" },
        { term: "NNF", definition: "Negation Normal Form，否定范式，否定操作仅出现在原子命题前。" },
        { term: "DNF", definition: "Disjunctive Normal Form，析取范式，若干合取项的析取。" },
        { term: "CNF", definition: "Conjunctive Normal Form，合取范式，若干析取项的合取。" },
        { term: "SAT", definition: "Boolean Satisfiability Problem，布尔可满足性问题，判断是否存在真值赋值使命题公式为真。" },
        { term: "ANTLR", definition: "Another Tool for Language Recognition，语言识别生成器，可生成词法/语法/树分析器。" },
        { term: "LLVM", definition: "Low Level Virtual Machine，底层虚拟机，一套模块化编译基础设施，以 SSA 型 IR 为核心。" }
    ];

    let cards = [];
    let currentIdx = 0;
    let showingAnswer = false;

    const termEl = document.getElementById('termDisplay');
    const defEl = document.getElementById('defDisplay');
    const cardContainer = document.getElementById('flashcard');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    const shuffleBtn = document.getElementById('shuffleBtn');
    const progressSpan = document.getElementById('progressCounter');

    function shuffleArray(arr) {
        for (let i = arr.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
    }

    function initCards() {
        const initCopy = TERMS_DATA.map(item => ({ ...item }));
        cards = shuffleArray(initCopy);
        currentIdx = 0;
        showingAnswer = false;
        updateCardDisplay();
        updateProgressText();
    }

    function updateCardDisplay() {
        if (!cards.length) return;
        const card = cards[currentIdx];
        termEl.innerText = card.term;
        defEl.innerText = card.definition;
        defEl.style.display = showingAnswer ? 'block' : 'none';
    }

    function updateProgressText() {
        progressSpan.innerText = cards.length ? `${currentIdx + 1} / ${cards.length}` : `0 / 0`;
    }

    function toggleAnswer() {
        showingAnswer = !showingAnswer;
        updateCardDisplay();
    }

    function nextCard() {
        showingAnswer = false;
        currentIdx = (currentIdx + 1) % cards.length;
        updateCardDisplay();
        updateProgressText();
    }

    function prevCard() {
        showingAnswer = false;
        currentIdx = (currentIdx - 1 + cards.length) % cards.length;
        updateCardDisplay();
        updateProgressText();
    }

    function randomShuffle() {
        shuffleArray(cards);
        currentIdx = 0;
        showingAnswer = false;
        updateCardDisplay();
        updateProgressText();
    }

    function bindEvents() {
        cardContainer.addEventListener('click', toggleAnswer);
        prevBtn.addEventListener('click', prevCard);
        nextBtn.addEventListener('click', nextCard);
        shuffleBtn.addEventListener('click', randomShuffle);

        window.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft') { prevCard(); e.preventDefault(); }
            else if (e.key === 'ArrowRight') { nextCard(); e.preventDefault(); }
            else if (e.key === 'ArrowUp' || e.key === ' ') { toggleAnswer(); e.preventDefault(); }
        });
    }

    initCards();
    bindEvents();
</script>
</body>
</html>
